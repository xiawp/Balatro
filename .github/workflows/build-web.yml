name: Build Web

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest

    env:
      GAME_NAME: "Balatro"

    steps:
      # ── 1. Исходники ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Зависимости сборки ──────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3 python3-pip \
            zip unzip \
            wget curl

      # ── 3. Emscripten ──────────────────────────────────────────────
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.56"
          actions-cache-folder: emsdk-cache

      # ── 4. Клонируем love.js ───────────────────────────────────────
      - name: Clone love.js
        run: |
          git clone --depth 1 \
            https://github.com/Davidobot/love.js.git \
            lovejs
          echo "=== lovejs root ==="
          ls lovejs/

      # ── 5. Упаковываем игру в .love-архив ─────────────────────────
      - name: Package game as .love
        run: |
          cd "$GITHUB_WORKSPACE"
          zip -9 -r "game.love" . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.love" \
            --exclude "lovejs/*" \
            --exclude "emsdk-cache/*"
          echo "game.love size: $(du -sh game.love | cut -f1)"

      # ── 6. Собираем веб-билд через love.js ────────────────────────
      - name: Build web with love.js
        run: |
          # Ищем точку входа — в разных версиях репо имя скрипта отличается
          SCRIPT=""
          for candidate in lovejs/love.py lovejs/src/love.py lovejs/build.py; do
            if [ -f "$candidate" ]; then
              SCRIPT="$candidate"
              break
            fi
          done
          if [ -z "$SCRIPT" ]; then
            echo "ERROR: love.js build script not found. Contents:"
            find lovejs/ -name "*.py" | head -20
            exit 1
          fi
          echo "Using: $SCRIPT"
          python3 "$SCRIPT" \
            "game.love" \
            "web-build" \
            --title "${{ env.GAME_NAME }}" \
            --memory 268435456

      # ── 7. Проверяем результат ─────────────────────────────────────
      - name: Verify build output
        run: |
          echo "=== web-build contents ==="
          ls -lh web-build/
          test -f web-build/index.html || (echo "ERROR: index.html not found!" && exit 1)

      # ── 8. Загружаем артефакт ──────────────────────────────────────
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-web
          path: web-build/
          retention-days: 30
